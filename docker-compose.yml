services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ID: ${BUILD_ID:?Set BUILD_ID to the immutable release ID before building}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override paths for the container layout (uploads mounted at /uploads).
      NODE_ENV: production
      PORT: 3000
      UPLOAD_DIR: /uploads
    volumes:
      - ./uploads:/uploads
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
